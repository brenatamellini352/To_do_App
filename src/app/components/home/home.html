<button class="theme_toggle" (click)="toggle_theme()" title="Alternar tema">🌙</button>
<section class="container">
  <h1>Bem-vindo à sua lista de tarefas!</h1>
  <p>Organize seu dia a dia com facilidade.</p>
  <div class="task_input_container">
    <input type="text" [(ngModel)]="newTaskTitle" placeholder="Adicione uma nova tarefa...">
    <button (click)="addTask()">+</button>
  </div>
    <ul class="task_list">
        <li *ngFor="let task of tasks">
            {{ task.title }}
        </li>
    </ul>
    <div class="progress_container">
        <div class="progress_bar" [style.width.%]="progressValue"></div>
    </div>
</section>
